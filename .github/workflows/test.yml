name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-clean:
    name: Clean repo passes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          scan-mode: all

  test-bidi:
    name: Detect bidi controls
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create bidi file
        run: printf 'normal\nbidi\xe2\x80\xae override\n' > bidi.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          disable-annotations: 'true'
        continue-on-error: true
      - run: |
          [ "${{ steps.scan.outputs.critical }}" -ge 1 ] || { echo "Expected critical finding"; exit 1; }

  test-invisible:
    name: Detect invisible chars
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create file with ZWS
        run: printf 'x = zero\xe2\x80\x8bwidth\n' > zws.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          disable-annotations: 'true'
        continue-on-error: true
      - run: |
          [ "${{ steps.scan.outputs.findings }}" -ge 1 ] || { echo "Expected findings"; exit 1; }

  test-confusable:
    name: Detect confusable collision
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create file with Latin/Cyrillic collision
        run: |
          # "scope" in ASCII, then "sc[U+043E]pe" with Cyrillic o
          printf 'scope = 1\nsc\xd0\xbepe = 2\n' > confuse.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          disable-annotations: 'true'
        continue-on-error: true
      - run: |
          [ "${{ steps.scan.outputs.findings }}" -ge 1 ] || { echo "Expected confusable finding"; exit 1; }

  test-mixed-script:
    name: Detect mixed-script identifier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create file with mixed Latin/Cyrillic identifier
        run: |
          # "payl[U+043E]ad" with Cyrillic o in the middle
          printf 'payl\xd0\xbead = True\n' > mixed.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          disable-annotations: 'true'
        continue-on-error: true
      - run: |
          [ "${{ steps.scan.outputs.findings }}" -ge 1 ] || { echo "Expected mixed-script finding"; exit 1; }

  test-sarif:
    name: SARIF output
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create adversarial file
        run: printf 'bidi\xe2\x80\xae attack\n' > bidi.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          sarif-file: results.sarif
          disable-annotations: 'true'
        continue-on-error: true
      - name: Validate SARIF
        run: |
          jq -e '.version == "2.1.0"' results.sarif
          jq -e '.runs[0].tool.driver.name == "unicode-safety-check"' results.sarif
          jq -e '.runs[0].results | length > 0' results.sarif

  test-spacing:
    name: Detect suspicious spacing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create file with NBSP
        run: printf 'if\xc2\xa0(x):\n  pass\n' > nbsp.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          disable-annotations: 'true'
        continue-on-error: true
      - run: |
          [ "${{ steps.scan.outputs.findings }}" -ge 1 ] || { echo "Expected spacing finding"; exit 1; }

  test-exclude:
    name: Exclusion patterns
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create adversarial file in excluded dir
        run: |
          mkdir -p vendor
          printf 'pua \xee\x80\x80\n' > vendor/dep.py
      - uses: ./
        with:
          scan-mode: all

  test-control-chars:
    name: Detect control characters
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create file with bell character
        run: printf 'x = "\x07"\n' > bell.py
      - id: scan
        uses: ./
        with:
          scan-mode: all
          disable-annotations: 'true'
        continue-on-error: true
      - run: |
          [ "${{ steps.scan.outputs.findings }}" -ge 1 ] || { echo "Expected control char finding"; exit 1; }
